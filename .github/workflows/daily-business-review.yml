name: Daily Business Review

on:
  schedule:
    # 7:00 AM MDT (UTC-6 in summer) = 13:00 UTC
    # Runs every day — posts a summary to Discord of yesterday's job search activity
    - cron: '0 13 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  dbr:
    name: Post Daily Business Review to Discord
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Post Daily Business Review
        working-directory: server
        run: npm run dbr
