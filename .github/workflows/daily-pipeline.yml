name: Daily Job Discovery Pipeline

on:
  schedule:
    # 5:00 AM MDT (UTC-6) = 11:00 UTC — runs before the DBR so stats are fresh
    - cron: '0 11 * * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI
    inputs:
      mode:
        description: 'Which stage to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - scrape
          - score

jobs:
  pipeline:
    name: Scrape → Score → Generate → Notify
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      USAJOBS_USER_AGENT: ${{ secrets.USAJOBS_USER_AGENT }}
      USAJOBS_API_KEY: ${{ secrets.USAJOBS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Scrape job boards
        if: ${{ github.event.inputs.mode == 'all' || github.event.inputs.mode == 'scrape' || github.event_name == 'schedule' }}
        working-directory: server
        run: npm run scrape
        # LinkedIn/Indeed may be blocked from GH Actions IPs — USAJobs always works.
        # Scraper failures are non-fatal (each source fails independently).
        continue-on-error: false

      - name: Score jobs + generate documents + notify Discord
        if: ${{ github.event.inputs.mode == 'all' || github.event.inputs.mode == 'score' || github.event_name == 'schedule' }}
        working-directory: server
        run: npm run score
        # This scores all new jobs with Claude, generates resume + cover letter
        # for anything scoring 7+, and posts individual Discord notifications.
