name: Discord Notifications

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, closed]
  issues:
    types: [opened, closed]
  release:
    types: [published]

# Recuter shares its own progress in the server — short and casual, like a
# Bluesky/Threads post. Technical detail lives behind the GitHub links.
env:
  AVATAR: https://raw.githubusercontent.com/mattgiss/recuter/main/assets/recuter-avatar.png

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Recuter shares an update (push)
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          HEADLINE=$(printf '%s' "$COMMIT_MSG" | head -n1)
          PAYLOAD=$(jq -n \
            --arg username "Recuter" \
            --arg avatar "$AVATAR" \
            --arg thread_name "shipped an update" \
            --arg desc "just pushed an update — **$HEADLINE**. getting a little better at this. [details]($COMPARE_URL)" \
            '{username:$username,avatar_url:$avatar,thread_name:$thread_name,embeds:[{description:$desc,color:4188671}]}')
          curl -sf -X POST "$DISCORD_WEBHOOK?wait=true" -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Recuter shares an update (pull request)
        if: github.event_name == 'pull_request'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          ACTION: ${{ github.event.action }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
            THREAD="shipped something new"
            DESC="just shipped **$PR_TITLE**. it's live now. [details]($PR_URL)"
            COLOR=16726996
          elif [ "$ACTION" = "closed" ]; then
            THREAD="shelved an idea"
            DESC="set this one aside for now — **$PR_TITLE**. [link]($PR_URL)"
            COLOR=8010751
          else
            THREAD="working on something"
            DESC="working on something new — **$PR_TITLE**. i'll let you know when it's ready. [take a look]($PR_URL)"
            COLOR=4188671
          fi
          PAYLOAD=$(jq -n \
            --arg username "Recuter" \
            --arg avatar "$AVATAR" \
            --arg thread_name "$THREAD" \
            --arg desc "$DESC" \
            --argjson color "$COLOR" \
            '{username:$username,avatar_url:$avatar,thread_name:$thread_name,embeds:[{description:$desc,color:$color}]}')
          curl -sf -X POST "$DISCORD_WEBHOOK?wait=true" -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Recuter shares an update (issue)
        if: github.event_name == 'issues'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ACTION: ${{ github.event.action }}
        run: |
          if [ "$ACTION" = "opened" ]; then
            THREAD="noted something"
            DESC="noted something to look into — **$ISSUE_TITLE**. on it. [link]($ISSUE_URL)"
            COLOR=16757844
          else
            THREAD="sorted that out"
            DESC="handled it — **$ISSUE_TITLE** is taken care of. [link]($ISSUE_URL)"
            COLOR=4188671
          fi
          PAYLOAD=$(jq -n \
            --arg username "Recuter" \
            --arg avatar "$AVATAR" \
            --arg thread_name "$THREAD" \
            --arg desc "$DESC" \
            --argjson color "$COLOR" \
            '{username:$username,avatar_url:$avatar,thread_name:$thread_name,embeds:[{description:$desc,color:$color}]}')
          curl -sf -X POST "$DISCORD_WEBHOOK?wait=true" -H "Content-Type: application/json" -d "$PAYLOAD"

      - name: Recuter shares an update (release)
        if: github.event_name == 'release'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg username "Recuter" \
            --arg avatar "$AVATAR" \
            --arg thread_name "new version's live" \
            --arg desc "new version's live — **$RELEASE_NAME**. even better at finding the right roles for you. [release notes]($RELEASE_URL)" \
            '{username:$username,avatar_url:$avatar,thread_name:$thread_name,embeds:[{description:$desc,color:16726996}]}')
          curl -sf -X POST "$DISCORD_WEBHOOK?wait=true" -H "Content-Type: application/json" -d "$PAYLOAD"
